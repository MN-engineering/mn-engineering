<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MN-Engineering | Усть-Каменогорск</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f8fafc; margin: 0; padding: 0; line-height: 1.6; }
        
        /* СТИЛЬ ШАПКИ С ЛОГОТИПОМ */
        header { background: #1e293b; padding: 40px 15px; text-align: center; border-bottom: 3px solid #3b82f6; }
        
        .logo-box { display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 15px; }
        
        .logo-icon { font-size: 3rem; color: #3b82f6; margin-bottom: 10px; position: relative; display: inline-block; }
        .logo-icon::after { content: "\f043"; font-family: "Font Awesome 5 Free"; font-weight: 900; position: absolute; font-size: 1.2rem; color: #00d4ff; bottom: -5px; right: -10px; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); }
        
        h1 { color: #f8fafc; letter-spacing: 2px; text-transform: uppercase; margin: 5px 0; font-size: 1.6rem; font-weight: 800; line-height: 1.2; }
        .tagline { font-size: 0.95rem; color: #3b82f6; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; max-width: 300px; margin: 0 auto; }
        .city { color: #64748b; font-size: 0.85rem; margin-top: 8px; }
        
        /* ОСТАЛЬНЫЕ СТИЛИ БЕЗ ИЗМЕНЕНИЙ */
        .container { max-width: 800px; margin: 20px auto; padding: 0 15px; }
        .services { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 20px; }
        @media (min-width: 600px) { .services { grid-template-columns: 1fr 1fr; } }
        .card { background: #1e293b; padding: 20px; border-radius: 8px; border-left: 4px solid #3b82f6; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .card h3 { margin-top: 0; color: #3b82f6; font-size: 1.1rem; text-transform: uppercase; }
        .gallery-title { text-align: center; color: #3b82f6; margin-top: 40px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; font-size: 1.2rem; }
        .gallery { display: grid; grid-template-columns: 1fr; gap: 15px; margin-bottom: 40px; }
        @media (min-width: 500px) { .gallery { grid-template-columns: 1fr 1fr; } }
        @media (min-width: 800px) { .gallery { grid-template-columns: 1fr 1fr 1fr; } }
        .gallery-img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; border: 2px solid #334155; cursor: pointer; }
        #modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); text-align: center; }
        #modal-img { max-width: 90%; max-height: 80%; margin-top: 10%; border-radius: 5px; }
        .close { position: absolute; top: 20px; right: 30px; color: #fff; font-size: 40px; font-weight: bold; cursor: pointer; }
        .cta-box { text-align: center; margin-top: 40px; padding: 30px; background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%); border-radius: 12px; color: white; }
        .btn { display: inline-block; background: #25D366; color: white; padding: 15px 35px; border-radius: 50px; text-decoration: none; font-weight: bold; margin-top: 20px; font-size: 1.1rem; text-transform: uppercase; }
        footer { text-align: center; padding: 40px; color: #64748b; font-size: 0.8rem; border-top: 1px solid #1e293b; }
        .contact-phone { display: block; color: white; font-size: 1.5rem; margin-top: 10px; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <div class="logo-icon">
            <i class="fas fa-microchip"></i>
        </div>
        <h1>MN-ENGINEERING</h1>
    </div>
    <div class="tagline">Проектирование автоматического полива</div>
    <div class="city">г. Усть-Каменогорск</div>
</header>
